<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Estágio PWA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
</head>
<body>

    <header>
        <h1>📄 Gestão de Estágios</h1>
        <div class="role-selector">
            <button onclick="switchView('aluno')">Área do Aluno</button>
            <button onclick="switchView('coordenador')">Área do Coordenador</button>
            <button onclick="switchView('admin')">Área do Admin</button>
        </div>
    </header>

    <main>
        <section id="view-aluno" class="view-section">
            <h2>Formulário de Envio</h2>
            <div class="card text-left">
                <div class="form-group">
                    <label>Nome Completo:</label>
                    <input type="text" id="aluno-nome">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Telefone:</label>
                        <input type="tel" id="aluno-telefone" placeholder="(00) 00000-0000">
                    </div>
                    <div class="form-group">
                        <label>RA ou CPF:</label>
                        <input type="text" id="aluno-registro">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Curso:</label>
                        <input type="text" id="aluno-curso">
                    </div>
                    <div class="form-group">
                        <label>Local do Estágio:</label>
                        <input type="text" id="aluno-local">
                    </div>
                </div>
                <div class="form-group">
                    <label>Coordenador de Destino:</label>
                    <select id="aluno-coordenador-select"></select>
                </div>
                <label for="pdf-input" class="drop-zone">
                    <span>Clique aqui ou arraste os PDFs</span>
                    <input type="file" id="pdf-input" accept="application/pdf" multiple>
                </label>
                <ul id="lista-arquivos-selecionados"></ul>
                <button id="btn-enviar" class="btn-primary" style="width: 100%;">Enviar Documentos</button>
            </div>
        </section>

        <section id="view-login" class="view-section hidden">
            <h2 id="login-titulo">Acesso Restrito</h2>
            <div class="card card-login">
                <input type="password" id="senha-acesso" placeholder="Senha...">
                <button id="btn-login" class="btn-primary">Entrar</button>
            </div>
        </section>

        <section id="view-admin" class="view-section hidden">
            <div class="header-interno">
                <h2>Administração</h2>
                <button onclick="logout()" class="btn-danger">Sair</button>
            </div>
            <div class="admin-container">
                <div class="card text-left">
                    <h3>Cadastrar Coordenador</h3>
                    <input type="text" id="admin-nome-coord" placeholder="Nome">
                    <input type="text" id="admin-curso-coord" placeholder="Curso" style="margin: 10px 0;">
                    <button id="btn-cadastrar-coord" class="btn-primary">Adicionar</button>
                </div>
                <div class="card">
                    <h3>Lista de Coordenadores</h3>
                    <ul id="lista-coordenadores-cadastrados"></ul>
                </div>
            </div>
        </section>

        <section id="view-coordenador" class="view-section hidden">
            <div class="header-interno">
                <h2>Painel Coordenador</h2>
                <button onclick="logout()" class="btn-danger">Sair</button>
            </div>
            <div class="filtro-container">
                <label>Filtrar por:</label>
                <select id="filtro-coordenador" onchange="atualizarPainelCoordenador()"></select>
            </div>
            <div class="coordenador-container">
                <div class="sidebar">
                    <div class="sidebar-block">
                        <h3>Pendentes</h3>
                        <ul id="lista-documentos"></ul>
                    </div>
                    <div class="sidebar-block" style="margin-top: 20px;">
                        <h3 style="background:#16a34a">Atendidos</h3>
                        <ul id="lista-alunos-atendidos"></ul>
                    </div>
                </div>
                <div class="preview-area">
                    <div class="carimbo-config-box">
                        <label><strong>Seu Carimbo (JPG):</strong></label>
                        <input type="file" id="coordenador-carimbo-img" accept="image/jpeg, image/jpg">
                    </div>
                    <div id="dados-aluno-preview" class="hidden"></div>
                    <iframe id="pdf-preview" class="hidden" style="width:100%; height:500px; border-radius:8px;"></iframe>
                    <button id="btn-baixar-final" class="btn-success hidden" style="width: 100%; margin-top: 15px;">Validar, Carimbar e Baixar PDF</button>
                </div>
            </div>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
